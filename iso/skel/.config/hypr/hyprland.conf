# RobinOS — Hyprland 기본 설정
# 문서: https://wiki.hyprland.org/Configuring/

### 모니터 ###############################################################
monitor = , preferred, auto, 1

### 자동 실행 ############################################################
# 배경: swaybg가 VM 소프트웨어 렌더링에서 hyprpaper보다 안정적
exec-once = swaybg -i /usr/share/backgrounds/robinos/wallpaper.png -m fill
exec-once = waybar
exec-once = swaync
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wl-paste --watch cliphist store
# 한글 입력기
exec-once = fcitx5 -d
# 첫 환영 — 잠깐 뒤 알림 한 번
exec-once = sleep 2 && notify-send -i computer "RobinOS" "환영합니다. 비서는 SUPER+A · 앱은 SUPER+D · 터미널은 SUPER+Return"

### 환경 변수 ############################################################
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct
env = GTK_IM_MODULE,fcitx
env = QT_IM_MODULE,fcitx
env = XMODIFIERS,@im=fcitx

### 입력 ################################################################
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}

### 모양 — RobinOS 시그니처 ##############################################
general {
    gaps_in = 6
    gaps_out = 14
    border_size = 2
    col.active_border = rgba(78aaffee) rgba(7d5fffee) 45deg
    col.inactive_border = rgba(2a2e3aaa)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 12
    active_opacity = 1.0
    inactive_opacity = 0.96

    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = true
    }

    shadow {
        enabled = true
        range = 24
        render_power = 3
        color = rgba(00000055)
    }
}

### 애니메이션 — RobinOS 시그니처 이징 ###################################
animations {
    enabled = true
    bezier = robin, 0.16, 1, 0.3, 1
    bezier = robinBounce, 0.34, 1.56, 0.64, 1
    animation = windows, 1, 5, robin, popin 80%
    animation = windowsOut, 1, 5, robin, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 6, robin
    animation = workspaces, 1, 5, robin, slide
}

dwindle {
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

### 키 바인딩 ###########################################################
$mod = SUPER

bind = $mod, Return, exec, kitty
bind = $mod, A, exec, kitty --title "Robin" -e robin
bind = $mod, D, exec, wofi --show drun
bind = $mod, E, exec, thunar
bind = $mod, B, exec, firefox
bind = $mod, Q, killactive,
bind = $mod, M, exit,
bind = $mod, V, togglefloating,
bind = $mod, F, fullscreen,
bind = $mod, P, pseudo,
bind = $mod, L, exec, hyprlock
bind = $mod, Escape, exec, robinos-powermenu

# 스크린샷 (영역 선택 → 클립보드)
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy

# 미디어 / 볼륨 / 밝기
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# 워크스페이스 1~5
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# 창 포커스 이동
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# 마우스로 창 이동/크기
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
