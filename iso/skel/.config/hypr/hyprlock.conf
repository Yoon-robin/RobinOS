# RobinOS — 잠금/로그인 화면 (hyprlock)
# SUPER+L 로 잠근다.

general {
    hide_cursor = true
    grace = 0
    disable_loading_bar = true
}

background {
    monitor =
    path = /usr/share/backgrounds/robinos/wallpaper.png
    color = rgba(11, 13, 20, 1.0)
    blur_passes = 3
    blur_size = 7
    brightness = 0.7
}

# 큰 시계
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgba(255, 255, 255, 1.0)
    font_size = 96
    font_family = JetBrainsMono Nerd Font
    position = 0, 180
    halign = center
    valign = center
}

# 날짜
label {
    monitor =
    text = cmd[update:60000] date +"%Y년 %m월 %d일 %A"
    color = rgba(185, 192, 212, 1.0)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 90
    halign = center
    valign = center
}

# RobinOS 마크
label {
    monitor =
    text = RobinOS
    color = rgba(120, 170, 255, 1.0)
    font_size = 26
    font_family = JetBrainsMono Nerd Font
    position = 0, -220
    halign = center
    valign = center
}

# 비밀번호 입력
input-field {
    monitor =
    size = 300, 54
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(120, 170, 255, 1.0)
    inner_color = rgba(20, 23, 32, 0.85)
    font_color = rgba(230, 233, 240, 1.0)
    placeholder_text = <span foreground="##8a90a3">비밀번호</span>
    fade_on_empty = false
    rounding = 14
    position = 0, -40
    halign = center
    valign = center
}
