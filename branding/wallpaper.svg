<svg xmlns="http://www.w3.org/2000/svg" width="2560" height="1440" viewBox="0 0 2560 1440">
  <defs>
    <radialGradient id="bg" cx="32%" cy="28%" r="95%">
      <stop offset="0%" stop-color="#1b2236"/>
      <stop offset="45%" stop-color="#131722"/>
      <stop offset="100%" stop-color="#0b0d14"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#78aaff"/>
      <stop offset="100%" stop-color="#7d5fff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#78aaff" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#78aaff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="2560" height="1440" fill="url(#bg)"/>

  <!-- 은은한 코너 글로우 -->
  <circle cx="640" cy="380" r="900" fill="url(#glow)"/>

  <!-- 그리드 라인 (아주 옅게) -->
  <g stroke="#ffffff" stroke-opacity="0.025" stroke-width="1">
    <line x1="0" y1="360" x2="2560" y2="360"/>
    <line x1="0" y1="720" x2="2560" y2="720"/>
    <line x1="0" y1="1080" x2="2560" y2="1080"/>
    <line x1="640" y1="0" x2="640" y2="1440"/>
    <line x1="1280" y1="0" x2="1280" y2="1440"/>
    <line x1="1920" y1="0" x2="1920" y2="1440"/>
  </g>

  <!-- RobinOS 마크 -->
  <g transform="translate(1280 720)">
    <circle r="120" fill="none" stroke="url(#accent)" stroke-width="6" opacity="0.9"/>
    <circle r="180" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.35"/>
    <text x="0" y="14" text-anchor="middle"
          font-family="JetBrains Mono, monospace" font-size="96" font-weight="700"
          fill="url(#accent)">R</text>
  </g>

  <text x="1280" y="980" text-anchor="middle"
        font-family="JetBrains Mono, monospace" font-size="40" font-weight="600"
        letter-spacing="14" fill="#e6e9f0" opacity="0.85">RobinOS</text>
</svg>
